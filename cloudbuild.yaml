steps:
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - --destination=gcr.io/$PROJECT_ID/emporio-gelada:$COMMIT_SHA
      - --destination=gcr.io/$PROJECT_ID/emporio-gelada:latest
      - --cache=true
      - --cache-ttl=24h
      - --dockerfile=Dockerfile.prod

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - run
      - deploy
      - emporio-gelada
      - --image=gcr.io/$PROJECT_ID/emporio-gelada:$COMMIT_SHA
      - --region=us-east4
      - --platform=managed
      - --allow-unauthenticated
      - --port=5000
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only
      - --memory=256Mi
      - --cpu=1
      - --max-instances=1
      - --min-instances=0
      - --concurrency=25

      # ── Variáveis de ambiente (não sensíveis) ─────────────────────────────
      - --set-env-vars=NODE_ENV=production

      # Loja / pedidos
      - --set-env-vars=ORDER_PREFIX=EG
      - --set-env-vars=STORE_ORIGIN_ZIP=36015260
      - --set-env-vars=URL_APP=https://loja.emporiogelada.com.br

      # Melhor Envio — comportamento
      - --set-env-vars=MELHOR_ENVIO_SANDBOX=false
      - --set-env-vars=MELHOR_ENVIO_COLLECT=false
      # - --set-env-vars=MELHOR_ENVIO_COLLECT_DATE=2025-01-01   # ativar se quiser data fixa

      # Melhor Envio — dados do remetente (não sensíveis)
      - --set-env-vars=MELHOR_ENVIO_FROM_NAME=Empório Gelada
      - --set-env-vars=MELHOR_ENVIO_FROM_PHONE=553232365994
      - --set-env-vars=MELHOR_ENVIO_FROM_EMAIL=contato@emporiogelada.com.br
      - --set-env-vars=MELHOR_ENVIO_FROM_ADDRESS=Av. Pedro Henrique Krambeck
      - --set-env-vars=MELHOR_ENVIO_FROM_NUMBER=1249
      - --set-env-vars=MELHOR_ENVIO_FROM_DISTRICT=Centro
      - --set-env-vars=MELHOR_ENVIO_FROM_CITY=Juiz de Fora
      - --set-env-vars=MELHOR_ENVIO_FROM_STATE=MG
      # - --set-env-vars=MELHOR_ENVIO_FROM_COMPLEMENT=Sala 1   # opcional

      # E-mail SMTP (host/porta não sensíveis)
      - --set-env-vars=SMTP_HOST=smtp.gmail.com
      - --set-env-vars=SMTP_PORT=465
      - --set-env-vars=SMTP_SECURE=true
      - --set-env-vars=SMTP_FROM=contato@emporiogelada.com.br

      # Carriers — flags de ativação
      - --set-env-vars=CORREIOS_LOCAL_ENABLED=false
      - --set-env-vars=LOGGI_ENABLED=false

      # ── Secrets (Secret Manager → variáveis de ambiente) ─────────────────
      # Crie cada secret com: gcloud secrets create NOME --data-file=-
      # Formato: ENV_VAR=nome-do-secret:versão
      - --set-secrets=DATABASE_URL=EG_DATABASE_URL:latest
      - --set-secrets=SESSION_SECRET=EG_SESSION_SECRET:latest

      # MercadoPago
      - --set-secrets=MERCADOPAGO_ACCESS_TOKEN=EG_MERCADOPAGO_ACCESS_TOKEN:latest
      - --set-secrets=MERCADOPAGO_PUBLIC_KEY=EG_MERCADOPAGO_PUBLIC_KEY:latest
      - --set-secrets=MERCADOPAGO_WEBHOOK_SECRET=EG_MERCADOPAGO_WEBHOOK_SECRET:latest

      # Melhor Envio — credenciais e dados sensíveis
      - --set-secrets=MELHOR_ENVIO_TOKEN=EG_MELHOR_ENVIO_TOKEN:latest
      - --set-secrets=MELHOR_ENVIO_FROM_DOCUMENT=EG_MELHOR_ENVIO_FROM_DOCUMENT:latest
      # - --set-secrets=MELHOR_ENVIO_FROM_COMPANY_DOCUMENT=MELHOR_ENVIO_FROM_COMPANY_DOCUMENT:latest  # se CNPJ diferente do CPF
      # - --set-secrets=MELHOR_ENVIO_USER_AGENT=MELHOR_ENVIO_USER_AGENT:latest  # opcional

      # E-mail SMTP — credenciais
      - --set-secrets=SMTP_USER=EG_SMTP_USER:latest
      - --set-secrets=SMTP_PASS=EG_SMTP_PASS:latest

      # Loggi (desativado por padrão — descomentar quando habilitar)
      # - --set-secrets=LOGGI_CLIENT_ID=LOGGI_CLIENT_ID:latest
      # - --set-secrets=LOGGI_CLIENT_SECRET=LOGGI_CLIENT_SECRET:latest
      # - --set-secrets=LOGGI_COMPANY_ID=LOGGI_COMPANY_ID:latest

      # Object Storage (GCS)
      - --set-secrets=GCS_BUCKET_NAME=EG_GCS_BUCKET_NAME:latest
      - --set-secrets=GCS_SERVICE_ACCOUNT_KEY=EG_GCS_SERVICE_ACCOUNT_KEY:latest

options:
  logging: CLOUD_LOGGING_ONLY
